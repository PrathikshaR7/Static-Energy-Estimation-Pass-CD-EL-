name: EnergyPass CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-22.04

    steps:

    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
          | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
        sudo add-apt-repository \
          "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-17 main"
        sudo apt-get update
        sudo apt-get install -y \
          cmake ninja-build \
          clang-17 llvm-17 llvm-17-dev llvm-17-tools \
          python3 python3-pip
        pip3 install psutil
        echo "LLVM version:"
        /usr/lib/llvm-17/bin/opt --version

    # FIX 1: Create remarks/ early so upload-artifact always finds it
    - name: Create output directories
      run: mkdir -p "$GITHUB_WORKSPACE/remarks"

    - name: Patch lib/CMakeLists.txt
      run: |
        cat > lib/CMakeLists.txt << 'CMAKE'
        add_llvm_pass_plugin(EnergyPass
          EnergyPass.cpp
        )
        target_link_libraries(EnergyPass PRIVATE
          LLVMCore
          LLVMSupport
          LLVMPasses
          LLVMAnalysis
        )
        CMAKE

    - name: Write CMakeUserPresets.json
      run: |
        cat > CMakeUserPresets.json << 'PRESET'
        {
          "version": 6,
          "configurePresets": [
            {
              "name": "linux-llvm17",
              "displayName": "Linux LLVM 17 (CI)",
              "binaryDir": "${sourceDir}/pass-build/linux",
              "generator": "Ninja",
              "cacheVariables": {
                "CMAKE_BUILD_TYPE":              "RelWithDebInfo",
                "CMAKE_EXPORT_COMPILE_COMMANDS": "ON",
                "LLVM_DIR":                      "/usr/lib/llvm-17/lib/cmake/llvm",
                "CMAKE_CXX_COMPILER":            "/usr/bin/clang++-17",
                "CMAKE_C_COMPILER":              "/usr/bin/clang-17"
              }
            }
          ],
          "buildPresets": [
            { "name": "linux-llvm17", "configurePreset": "linux-llvm17" }
          ]
        }
        PRESET

    - name: CMake Configure
      run: |
        cmake --preset linux-llvm17 \
          -DLLVM_DIR=/usr/lib/llvm-17/lib/cmake/llvm

    - name: CMake Build
      run: |
        cmake --build --preset linux-llvm17 --verbose
        ls -lh pass-build/linux/lib/EnergyPass.so

    - name: Run test suite
      run: |
        LLVM_BIN=/usr/lib/llvm-17/bin
        PASS=$GITHUB_WORKSPACE/pass-build/linux/lib/EnergyPass.so
        REMARKS_DIR=$GITHUB_WORKSPACE/remarks
        export ENERGY_MODEL_PATH=$GITHUB_WORKSPACE/data/energy_model.json

        PASS_OK=0
        PASS_FAIL=0

        for src in test/0*.c; do
          name=$(basename "${src%.c}")
          echo "========================================"
          echo " $name"
          echo "========================================"

          $LLVM_BIN/clang-17 -O1 -g -emit-llvm \
            "$src" -c -o /tmp/${name}.bc 2>&1

          if $LLVM_BIN/opt-17 \
              -load-pass-plugin="$PASS" \
              -passes="energy-pass" \
              -pass-remarks-analysis=energy \
              -pass-remarks-output="${REMARKS_DIR}/${name}_remarks.yml" \
              -disable-output /tmp/${name}.bc 2>&1; then
            echo "  [PASS] $name"
            PASS_OK=$((PASS_OK+1))
          else
            echo "  [FAIL] $name"
            PASS_FAIL=$((PASS_FAIL+1))
          fi
        done

        echo "Results: $PASS_OK passed, $PASS_FAIL failed"
        ls -lh "$REMARKS_DIR/"
        [ $PASS_FAIL -eq 0 ]

    - name: Run evaluation
      run: |
        export REPO_ROOT=$GITHUB_WORKSPACE
        export ENERGY_MODEL_PATH=$GITHUB_WORKSPACE/data/energy_model.json
        python3 scripts/evaluate.py || true

    - name: Upload remarks
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: energy-remarks
        path: remarks/
        if-no-files-found: warn
