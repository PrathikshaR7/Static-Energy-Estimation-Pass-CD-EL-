name: EnergyPass CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-22.04

    steps:

    # ── 1. Checkout ────────────────────────────────────────────────────────
    - name: Checkout repo
      uses: actions/checkout@v4

    # ── 2. Install LLVM 17 + tools ─────────────────────────────────────────
    - name: Install dependencies
      run: |
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
        sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-17 main"
        sudo apt-get update
        sudo apt-get install -y \
          cmake ninja-build \
          clang-17 llvm-17 llvm-17-dev llvm-17-tools \
          python3 python3-pip
        pip3 install psutil
        echo "LLVM version:"
        /usr/lib/llvm-17/bin/opt --version

    # ── 3. Patch CMakeLists.txt for Linux (no local build/ tree needed) ────
    - name: Patch CMakeLists for Linux
      run: |
        sed -i 's|include_directories(${CMAKE_SOURCE_DIR}/build/include)||g' CMakeLists.txt
        sed -i 's|include_directories(${CMAKE_SOURCE_DIR}/include)||g' CMakeLists.txt
        echo "CMakeLists.txt after patch:"
        cat CMakeLists.txt

    # ── 4. Write CMakeUserPresets.json ─────────────────────────────────────
    - name: Write CMakeUserPresets.json
      run: |
        cat > CMakeUserPresets.json << 'PRESET'
        {
          "version": 6,
          "configurePresets": [
            {
              "name": "linux-llvm17",
              "displayName": "Linux LLVM 17 (CI)",
              "binaryDir": "${sourceDir}/pass-build/linux",
              "generator": "Ninja",
              "cacheVariables": {
                "CMAKE_BUILD_TYPE":              "RelWithDebInfo",
                "CMAKE_EXPORT_COMPILE_COMMANDS": "ON",
                "LLVM_DIR":                      "/usr/lib/llvm-17/lib/cmake/llvm",
                "CMAKE_CXX_COMPILER":            "/usr/bin/clang++-17",
                "CMAKE_C_COMPILER":              "/usr/bin/clang-17"
              }
            }
          ],
          "buildPresets": [
            { "name": "linux-llvm17", "configurePreset": "linux-llvm17" }
          ]
        }
        PRESET

    # ── 5. Configure ───────────────────────────────────────────────────────
    - name: CMake Configure
      run: cmake --preset linux-llvm17 -DLLVM_DIR=/usr/lib/llvm-17/lib/cmake/llvm

    # ── 6. Build ───────────────────────────────────────────────────────────
    - name: CMake Build
      run: |
        cmake --build --preset linux-llvm17 --verbose
        echo "Built plugin:"
        ls -lh pass-build/linux/lib/EnergyPass.so

    # ── 7. Run all 7 test cases ────────────────────────────────────────────
    - name: Run test suite
      run: |
        set -e
        LLVM_BIN=/usr/lib/llvm-17/bin
        PASS=$GITHUB_WORKSPACE/pass-build/linux/lib/EnergyPass.so
        REMARKS_DIR=$GITHUB_WORKSPACE/remarks
        mkdir -p "$REMARKS_DIR"
        export ENERGY_MODEL_PATH=$GITHUB_WORKSPACE/data/energy_model.json

        PASS_OK=0
        PASS_FAIL=0

        for src in test/0*.c; do
          name=$(basename "${src%.c}")
          echo ""
          echo "========================================"
          echo " $name"
          echo "========================================"

          $LLVM_BIN/clang-17 -O1 -g -emit-llvm \
            "$src" -c -o /tmp/${name}.bc

          if $LLVM_BIN/opt-17 \
              -load-pass-plugin="$PASS" \
              -passes="energy-pass" \
              -pass-remarks-analysis=energy \
              -pass-remarks-output="${REMARKS_DIR}/${name}_remarks.yml" \
              -disable-output /tmp/${name}.bc; then
            echo "  [PASS] $name"
            PASS_OK=$((PASS_OK+1))
          else
            echo "  [FAIL] $name"
            PASS_FAIL=$((PASS_FAIL+1))
          fi
        done

        echo ""
        echo "========================================"
        echo " Results: $PASS_OK passed, $PASS_FAIL failed"
        echo "========================================"
        echo "Remarks files written:"
        ls -lh "$REMARKS_DIR/" || echo "  (none)"

        [ $PASS_FAIL -eq 0 ]

    # ── 8. Patch and run evaluation script ────────────────────────────────
    - name: Run evaluation
      run: |
        # evaluate.py hard-codes ~/Static-Energy-Estimation-Pass-CD-EL- and
        # mac/windows LLVM paths. We patch it in-place for the CI environment.
        sed -i \
          "s|REPO   = os.path.expanduser.*|REPO = os.environ.get('REPO_ROOT', os.getcwd())|" \
          scripts/evaluate.py
        sed -i \
          "s|PASS  = os.path.join(REPO, 'pass-build', 'mac-arm64'.*|PASS = os.path.join(REPO, 'pass-build', 'linux', 'lib', 'EnergyPass.so')|" \
          scripts/evaluate.py
        sed -i \
          "s|CLANG = os.path.join(BUILD, 'bin', 'clang')|CLANG = '/usr/lib/llvm-17/bin/clang-17'|" \
          scripts/evaluate.py
        sed -i \
          "s|OPT   = os.path.join(BUILD, 'bin', 'opt')|OPT   = '/usr/lib/llvm-17/bin/opt-17'|" \
          scripts/evaluate.py

        echo "--- Patched evaluate.py top section ---"
        head -30 scripts/evaluate.py

        export REPO_ROOT=$GITHUB_WORKSPACE
        export ENERGY_MODEL_PATH=$GITHUB_WORKSPACE/data/energy_model.json
        python3 scripts/evaluate.py || true

    # ── 9. Upload remarks YAML ─────────────────────────────────────────────
    - name: Upload remarks
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: energy-remarks
        path: remarks/
        if-no-files-found: warn
